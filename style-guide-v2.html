    <link rel="stylesheet" href="tokens.css">
    <style>
        body {
            min-height: 100vh;
            display: grid;

            color: var(--ink);
            font-family: var(--ff-sans);

        main {
            max-width: 560px;
            border-top: var(--hair) solid var(--ink);

            margin: 0 0 var(--s-4);
            font-family: var(--ff-serif);

        p {
            color: var(--ink-mute);
            line-height: var(--lh-normal);
        }

        a {
            color: var(--ink);
            font-weight: 500;
        }

    <main>
        <h1>Style Guide v2 is deprecated.</h1>
