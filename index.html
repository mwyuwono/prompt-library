<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <!-- Temporary cache-busting meta tags - remove after fix confirmed -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Prompt Library</title>
    <meta name="theme-color" content="#79830c">
    <meta name="application-name" content="Prompt Library">
    <meta name="apple-mobile-web-app-title" content="Prompts">
    <meta name="msapplication-TileColor" content="#79830c">
    <meta property="og:title" content="Prompt Library">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/public/icons/prompt-library/social-preview.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="/public/icons/prompt-library/social-preview.png">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="16x16" href="/public/icons/prompt-library/icon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/public/icons/prompt-library/icon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/public/icons/prompt-library/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/public/icons/prompt-library/apple-touch-icon.png">
    <link rel="manifest" href="/public/icons/prompt-library/site.webmanifest">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- Fonts imported via tokens.css -->
    <link rel="stylesheet" href="tokens.css?v=20260430-mobile">
    <link rel="stylesheet" href="styles.css?v=20260430-mobile">
</head>

<body>
    <div class="page-wrapper">
        <!-- Brand Header (Minimalist) -->
        <div class="header-top">
            <div class="header-logo-group">
                <img src="public/images/prompts-logo.svg" alt="Prompts Library Logo" class="header-logo-image">
                <div class="header-logo-text">Prompts</div>
            </div>
            <div class="header-actions">
                <a id="paletteLink" href="./fabric-palette/palette.html" target="_blank"
                   rel="noopener noreferrer" class="quick-link-btn palette-btn"
                   style="display: none;" aria-label="Open Fabric Palette">Palette</a>
                <!-- Quick Links - Desktop Only -->
                <div class="quick-links">
                    <a href="https://aistudio.google.com" target="_blank" rel="noopener noreferrer"
                        class="quick-link-btn">AI Studio</a>
                    <a href="https://gemini.google.com" target="_blank" rel="noopener noreferrer"
                        class="quick-link-btn">Gemini</a>
                    <a href="https://chat.openai.com" target="_blank" rel="noopener noreferrer"
                        class="quick-link-btn">ChatGPT</a>
                    <a href="https://www.claude.ai" target="_blank" rel="noopener noreferrer"
                        class="quick-link-btn">Claude</a>
                </div>
                <wy-button id="toggleFiltersBtn" variant="primary" size="small" icon="tune" icon-position="leading" aria-label="Toggle filters">
                    Filters
                </wy-button>
                <wy-button id="openLinksModal" variant="primary" size="small">AI Tools</wy-button>
                <wy-button
                    id="adminButton"
                    variant="outlined"
                    size="small"
                    icon="admin_panel_settings"
                    icon-position="leading"
                    aria-label="Open Admin Panel"
                    title="Open Admin Panel"
                    style="display: none;"
                >
                    Admin
                </wy-button>
            </div>
        </div>

        <!-- Gemini Loader -->
        <div id="geminiLoader" class="gemini-loader"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="container main-container">
                <!-- Controls Bar -->
                <wy-controls-bar id="controlsBar" class="controls-bar" hide-view-toggle hide-details-toggle show-private-vault-link></wy-controls-bar>
                
                <div class="prompt-area view-grid">
                    <!-- Prompt List View -->
                    <div id="promptList" class="prompt-list">
                        <!-- List items will be dynamically inserted here -->
                    </div>

                    <!-- Prompt Cards Grid -->
                    <div id="promptGrid" class="prompt-grid">
                        <!-- Cards will be dynamically inserted here -->
                    </div>

                    <!-- Empty State -->
                    <div id="emptyState" class="empty-state hidden">
                        <p>No prompts found matching your criteria.</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Toast Notification (Web Component) -->
        <wy-toast id="toast"></wy-toast>

        <!-- Copy Confirmation Panel (Web Component) -->
        <wy-copy-confirm id="copyConfirm"></wy-copy-confirm>

        <!-- Prompt Modal (Web Component) -->
        <wy-prompt-modal id="promptModal"></wy-prompt-modal>

        <!-- Links Modal (Web Component) -->
        <wy-links-modal id="linksModal" title="AI Tools" show-palette-entry></wy-links-modal>

        <!-- Color Palette Panel (Web Component) -->
        <wy-color-palette id="colorPalette"></wy-color-palette>

        <!-- Keyboard Shortcuts Modal (Web Component) -->
        <wy-modal id="shortcutsModal" heading="Keyboard Shortcuts" max-width="480px"></wy-modal>
    </div>

    <!-- Load local Web Components -->
    <script type="module" src="components/index.js?v=20260430-copy-confirm"></script>

    <script src="app.js?v=20260430-copy-confirm"></script>
    <script src="links.js?v=20260430-copy-confirm"></script>
</body>

</html>
