<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Admin Settings - Prompt Library</title>
    <meta name="theme-color" content="#79830c">
    <meta name="application-name" content="Prompt Library Admin">
    <meta name="apple-mobile-web-app-title" content="Prompt Admin">
    <meta name="msapplication-TileColor" content="#79830c">
    <meta property="og:title" content="Prompt Library Admin Settings">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/public/icons/prompt-admin/social-preview.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="/public/icons/prompt-admin/social-preview.png">
    <link rel="icon" href="/public/icons/prompt-admin/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="16x16" href="/public/icons/prompt-admin/icon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/public/icons/prompt-admin/icon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/public/icons/prompt-admin/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/public/icons/prompt-admin/apple-touch-icon.png">
    <link rel="manifest" href="/public/icons/prompt-admin/site.webmanifest">

    <link rel="stylesheet" href="tokens.css?v=20260319-1532">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
    <link rel="stylesheet" href="admin-settings.css?v=20260601-hero-settings">
</head>
<body class="settings-page">
    <header class="settings-header">
        <a class="settings-back-link" href="/admin.html?dataset=public">
            <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
            Admin
        </a>
        <div>
            <p class="settings-kicker">Prompt Library</p>
            <h1>Admin Settings</h1>
        </div>
    </header>

    <main class="settings-main">

        <section id="palettes-management" class="settings-section">
            <div class="settings-section-header">
                <div>
                    <p class="settings-kicker">Public site</p>
                    <h2>Color Palettes</h2>
                </div>
                <div class="settings-actions">
                    <button id="palettesDiscardButton" class="settings-button settings-button-secondary" type="button" disabled>
                        Discard
                    </button>
                    <button id="palettesSaveButton" class="settings-button settings-button-primary" type="button" disabled>
                        Save
                    </button>
                </div>
            </div>

            <div id="paletteList" class="palette-list"></div>

            <button id="addPaletteButton" class="settings-button settings-button-secondary palette-add-btn" type="button">
                <span class="material-symbols-outlined">add</span>
                Add Palette
            </button>

            <p id="palettesStatus" class="settings-status" role="status" aria-live="polite">Loading palettes...</p>
        </section>

        <section id="hero-image-master-prompt" class="settings-section">
            <div class="settings-section-header">
                <div>
                    <p class="settings-kicker">Hero images</p>
                    <h2>Master Prompt</h2>
                </div>
                <div class="settings-actions">
                    <button id="discardButton" class="settings-button settings-button-secondary" type="button" disabled>
                        Discard
                    </button>
                    <button id="saveButton" class="settings-button settings-button-primary" type="button" disabled>
                        Save
                    </button>
                </div>
            </div>

            <label class="settings-field" for="heroMasterPrompt">
                <span>Prompt template</span>
                <textarea id="heroMasterPrompt" spellcheck="false"></textarea>
            </label>

            <p class="settings-help">Include <code>{{subject_prompt}}</code> where the selected prompt summary should be inserted.</p>
            <p id="settingsStatus" class="settings-status" role="status" aria-live="polite">Loading settings...</p>
        </section>
    </main>

    <script type="module" src="admin-settings.js?v=20260601-hero-settings"></script>
</body>
</html>
