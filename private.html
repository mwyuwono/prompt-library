    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

    <meta http-equiv="Expires" content="0">

    <meta name="theme-color" content="#79830c">
    <meta name="application-name" content="Private Prompt Library">
    <meta name="apple-mobile-web-app-title" content="Private Prompts">
    <meta name="msapplication-TileColor" content="#79830c">
    <meta property="og:title" content="Private Prompt Library">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/public/icons/prompt-library/social-preview.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="/public/icons/prompt-library/social-preview.png">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="16x16" href="/public/icons/prompt-library/icon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/public/icons/prompt-library/icon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/public/icons/prompt-library/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/public/icons/prompt-library/apple-touch-icon.png">

    <link rel="stylesheet"

    <link rel="stylesheet" href="components.css?v=20260629-light-dom">
    <link rel="stylesheet" href="styles.css?v=20260430-mobile">
</head>

<body class="private-vault-page">
    <div class="page-wrapper">
        <div class="header-top">
            <div class="header-logo-group">
                <img src="public/images/prompts-logo.svg" alt="Prompts Library Logo" class="header-logo-image">
                <div class="header-logo-text">Private</div>
            </div>
            <div class="header-actions">
                <a href="./index.html" class="quick-link-btn" aria-label="Return to public prompts">Public Library</a>
                <wy-button id="openLinksModal" variant="primary" size="small">AI Tools</wy-button>
            </div>
        </div>

        <main class="main-content">
            <div class="container main-container private-vault-layout">
                <section id="vaultGate" class="vault-gate" aria-labelledby="vaultHeading">
                    <div class="vault-card">
                        <p class="vault-eyebrow">Private</p>
                        <h1 id="vaultHeading" class="vault-title">Enter passcode</h1>
                        <form id="vaultUnlockForm" class="vault-form">
                            <label class="vault-label" for="vaultPasscode">Passcode</label>
                            <input id="vaultPasscode" name="passcode" type="password" class="vault-input" autocomplete="current-password" inputmode="numeric" pattern="[0-9]*" required>
                            <button id="vaultUnlockButton" type="submit" class="vault-submit">Continue</button>
                            <p id="vaultMessage" class="vault-message" role="status" aria-live="polite"></p>
                        </form>
                    </div>
                </section>

                <section id="vaultApp" hidden>
                    <wy-controls-bar id="controlsBar" class="controls-bar" hide-view-toggle hide-details-toggle></wy-controls-bar>

                    <div class="prompt-area view-grid">
                        <div id="promptList" class="prompt-list"></div>
                        <div id="promptGrid" class="prompt-grid"></div>
                        <div id="emptyState" class="empty-state hidden">
                            <p>No private prompts found matching your criteria.</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <wy-toast id="toast"></wy-toast>
        <wy-copy-confirm id="copyConfirm"></wy-copy-confirm>
        <wy-prompt-modal id="promptModal"></wy-prompt-modal>
        <wy-links-modal id="linksModal" title="AI Tools"></wy-links-modal>
        <wy-modal id="shortcutsModal" heading="Keyboard Shortcuts" max-width="480px"></wy-modal>
    </div>

    <script>
        window.PROMPT_LIBRARY_CONFIG = { autoInit: false };
    </script>

    <script type="module" src="components/index.js?v=20260430-copy-confirm"></script>
    <script src="app.js?v=20260430-copy-confirm"></script>
    <script src="links.js?v=20260430-copy-confirm"></script>
    <script type="module" src="private-vault.js?v=20260410-1508"></script>
</body>

</html>
